project:
  type: book
  output-dir: docs

execute: 
  echo: false
  warning: false
  cache: true
  freeze: auto

book:
  title: "Demo"
  subtitle: Business and Economic Statistics
  # author: "Minh Huynh"
  # date: "10/29/2025"
  downloads: pdf
  reader-mode: true
  sidebar:
    align: left
    style: floating
    collapse-level: 2
    pinned: false
  
  
  chapters:
    - index.qmd
  


format:
  html:
    self-contained: false
    css: 
      - styles.css
      - include/webex.css
    include-after-body: 
      - include/webex.js
    theme:
      light: 
        - flatly
        #- custom.scss
      dark: 
        - darkly
        #- custom.scss
    number-sections: true
  pdf: default

editor: visual